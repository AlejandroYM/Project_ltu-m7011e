name: CI - Chef Match Microservices

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, recipe-service, recommendation-service]
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: 📦 Install dependencies
        run: |
          cd services/${{ matrix.service }}
          npm install

      - name: 🧪 Run Tests & Coverage (REQ5)
        env:
          NODE_ENV: test
        run: |
          cd services/${{ matrix.service }}
          npm test -- --coverage

  build-and-push:
    runs-on: ubuntu-latest
    needs: test-services
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [user-service, recipe-service, recommendation-service, frontend]

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Services backend ──────────────────────
      - name: 🔨 Build and Push (backend services)
        if: matrix.service != 'frontend'
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/chef-${{ matrix.service }}:latest

      # ── Frontend ─────────────
      - name: 🔨 Build and Push (frontend)
        if: matrix.service == 'frontend'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/chef-frontend:latest
          build-args: |
            VITE_UNSPLASH_ACCESS_KEY=${{ secrets.VITE_UNSPLASH_ACCESS_KEY }}