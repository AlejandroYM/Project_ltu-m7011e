apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq-service
  namespace: chefmatch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3-management
        ports:
        - containerPort: 5672
        - containerPort: 15672
        env:
        # Forma moderna y fiable de configurar el path prefix de la UI
        # Evita problemas de parsing con RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS
        - name: RABBITMQ_DEFAULT_USER
          value: "admin"
        - name: RABBITMQ_DEFAULT_PASS
          value: "admin"
        - name: RABBITMQ_MANAGEMENT_PATH_PREFIX
          value: "/rabbitmq"

---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
  namespace: chefmatch
spec:
  ports:
  - name: amqp
    port: 5672
    targetPort: 5672
  - name: management
    port: 15672
    targetPort: 15672
  selector:
    app: rabbitmq
