---
# advanced.config — formato Erlang nativo, SIEMPRE cargado por RabbitMQ
# Es la forma más fiable de setear management.path_prefix
apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-advanced-config
  namespace: chefmatch
data:
  advanced.config: |
    [
      {rabbitmq_management, [
        {path_prefix, "/rabbitmq"}
      ]}
    ].

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq-service
  namespace: chefmatch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3-management
        ports:
        - containerPort: 5672
        - containerPort: 15672
        env:
        - name: RABBITMQ_DEFAULT_USER
          value: "admin"
        - name: RABBITMQ_DEFAULT_PASS
          value: "admin"
        volumeMounts:
        - name: rabbitmq-advanced-config
          mountPath: /etc/rabbitmq/advanced.config
          subPath: advanced.config
      volumes:
      - name: rabbitmq-advanced-config
        configMap:
          name: rabbitmq-advanced-config

---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
  namespace: chefmatch
spec:
  ports:
  - name: amqp
    port: 5672
    targetPort: 5672
  - name: management
    port: 15672
    targetPort: 15672
  selector:
    app: rabbitmq
