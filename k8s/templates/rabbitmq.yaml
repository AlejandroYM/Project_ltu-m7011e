---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-config
  namespace: chefmatch
data:
  rabbitmq.conf: |
    default_user = admin
    default_pass = admin
    management.path_prefix = /rabbitmq

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq-service
  namespace: chefmatch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3-management
        ports:
        - containerPort: 5672
        - containerPort: 15672
        env:
        # Apuntamos a /custom-config/rabbitmq (sin .conf, la imagen lo añade)
        # Así evitamos el conflicto con /etc/rabbitmq/rabbitmq.conf del contenedor
        - name: RABBITMQ_CONFIG_FILE
          value: /custom-config/rabbitmq
        volumeMounts:
        - name: rabbitmq-config
          mountPath: /custom-config/rabbitmq.conf
          subPath: rabbitmq.conf
      volumes:
      - name: rabbitmq-config
        configMap:
          name: rabbitmq-config

---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
  namespace: chefmatch
spec:
  ports:
  - name: amqp
    port: 5672
    targetPort: 5672
  - name: management
    port: 15672
    targetPort: 15672
  selector:
    app: rabbitmq
