---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq-service
  namespace: chefmatch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      # El init container escribe advanced.config en un volumen compartido
      # ANTES de que RabbitMQ arranque — garantiza que el config se carga
      initContainers:
      - name: write-config
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo '[{rabbitmq_management, [{path_prefix, "/rabbitmq"}]}].' > /mnt/rabbitmq-config/advanced.config
          echo "default_user = admin" > /mnt/rabbitmq-config/rabbitmq.conf
          echo "default_pass = admin" >> /mnt/rabbitmq-config/rabbitmq.conf
          echo "Config written:"
          cat /mnt/rabbitmq-config/advanced.config
          cat /mnt/rabbitmq-config/rabbitmq.conf
        volumeMounts:
        - name: rabbitmq-config-dir
          mountPath: /mnt/rabbitmq-config
      containers:
      - name: rabbitmq
        image: rabbitmq:3-management
        ports:
        - containerPort: 5672
        - containerPort: 15672
        env:
        - name: RABBITMQ_CONFIG_FILE
          value: /etc/rabbitmq/rabbitmq.conf
        - name: RABBITMQ_ADVANCED_CONFIG_FILE
          value: /etc/rabbitmq/advanced.config
        volumeMounts:
        - name: rabbitmq-config-dir
          mountPath: /etc/rabbitmq
      volumes:
      - name: rabbitmq-config-dir
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
  namespace: chefmatch
spec:
  ports:
  - name: amqp
    port: 5672
    targetPort: 5672
  - name: management
    port: 15672
    targetPort: 15672
  selector:
    app: rabbitmq
