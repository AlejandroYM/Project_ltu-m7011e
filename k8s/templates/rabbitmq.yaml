---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq-service
  namespace: chefmatch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      initContainers:
      - name: write-config
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          cat > /mnt/rabbitmq-config/advanced.config << 'ERLANG'
          [{rabbitmq_management, [
            {listener, [
              {port, 15672},
              {path_prefix, <<"/rabbitmq">>}
            ]}
          ]}].
          ERLANG
          echo "default_user = admin" > /mnt/rabbitmq-config/rabbitmq.conf
          echo "default_pass = admin" >> /mnt/rabbitmq-config/rabbitmq.conf
          echo "[rabbitmq_management]." > /mnt/rabbitmq-config/enabled_plugins
          echo "=== advanced.config ===" && cat /mnt/rabbitmq-config/advanced.config
        volumeMounts:
        - name: config-dir
          mountPath: /mnt/rabbitmq-config
      containers:
      - name: rabbitmq
        image: rabbitmq:3.12-management
        ports:
        - containerPort: 5672
        - containerPort: 15672
        volumeMounts:
        - name: config-dir
          mountPath: /etc/rabbitmq
      volumes:
      - name: config-dir
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
  namespace: chefmatch
spec:
  ports:
  - name: amqp
    port: 5672
    targetPort: 5672
  - name: management
    port: 15672
    targetPort: 15672
  selector:
    app: rabbitmq
