# ================================================================
#  ChefMatch — Grafana Dashboards
#  Namespace: chefmatch  (corregido — antes estaba en 'default')
#
#  Recursos:
#    1. grafana-dashboard-provisioning  → le dice a Grafana dónde leer los JSON
#    2. grafana-dashboards              → el JSON del dashboard (Four Golden Signals)
#
#  Nota sobre el JSON:
#    El formato correcto para file provisioning es el objeto del dashboard
#    directamente, SIN el wrapper {"dashboard": {...}} que usa la API REST.
# ================================================================

# ── 1. Dashboard Provisioning Config ─────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provisioning
  namespace: chefmatch
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'ChefMatch'
        orgId: 1
        folder: 'ChefMatch'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards

---
# ── 2. Dashboard JSON ─────────────────────────────────────────────
# ⚠️  Sin wrapper {"dashboard": {...}} — ese formato es solo para la API REST.
#     Para file provisioning el JSON empieza directamente con {"title": ...}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: chefmatch
  labels:
    grafana_dashboard: "1"
data:
  four-golden-signals.json: |
    {
      "title": "ChefMatch - Four Golden Signals",
      "tags": ["chefmatch", "microservices", "sre"],
      "timezone": "browser",
      "refresh": "30s",
      "schemaVersion": 27,
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "job",
            "type": "query",
            "datasource": "Prometheus",
            "query": "label_values(http_requests_total, job)",
            "label": "Service",
            "refresh": 2,
            "includeAll": true,
            "allValue": ".*"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "🚦 GOLDEN SIGNAL 1: LATENCY — Response Time P50/P95/P99",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{job=~\"$job\"}[5m])) by (le, job, route))",
              "legendFormat": "P50 {{ "{{" }}job{{ "}}" }} {{ "{{" }}route{{ "}}" }}"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=~\"$job\"}[5m])) by (le, job, route))",
              "legendFormat": "P95 {{ "{{" }}job{{ "}}" }} {{ "{{" }}route{{ "}}" }}"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=~\"$job\"}[5m])) by (le, job, route))",
              "legendFormat": "P99 {{ "{{" }}job{{ "}}" }} {{ "{{" }}route{{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "lineWidth": 2 }
            }
          }
        },
        {
          "id": 2,
          "title": "📈 GOLDEN SIGNAL 2: TRAFFIC — Requests per Second",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=~\"$job\"}[5m])) by (job, route)",
              "legendFormat": "{{ "{{" }}job{{ "}}" }} {{ "{{" }}route{{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            }
          }
        },
        {
          "id": 3,
          "title": "❌ GOLDEN SIGNAL 3: ERRORS — Error Rate",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(http_request_errors_total{job=~\"$job\", error_type=\"server_error\"}[5m])) by (job, route)",
              "legendFormat": "5xx {{ "{{" }}job{{ "}}" }} {{ "{{" }}route{{ "}}" }}"
            },
            {
              "expr": "sum(rate(http_request_errors_total{job=~\"$job\", error_type=\"client_error\"}[5m])) by (job, route)",
              "legendFormat": "4xx {{ "{{" }}job{{ "}}" }} {{ "{{" }}route{{ "}}" }}"
            },
            {
              "expr": "100 * sum(rate(http_request_errors_total{job=~\"$job\"}[5m])) / sum(rate(http_requests_total{job=~\"$job\"}[5m]))",
              "legendFormat": "Error Rate %"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": 0,  "color": "green" },
                  { "value": 5,  "color": "yellow" },
                  { "value": 10, "color": "red" }
                ]
              }
            }
          }
        },
        {
          "id": 4,
          "title": "💾 GOLDEN SIGNAL 4: SATURATION — CPU Usage",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 16, "w": 8, "h": 6 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "rate(process_cpu_user_seconds_total{job=~\"$job\"}[5m]) * 100",
              "legendFormat": "CPU {{ "{{" }}job{{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percent" }
          }
        },
        {
          "id": 5,
          "title": "💾 SATURATION — Heap Memory Used",
          "type": "timeseries",
          "gridPos": { "x": 8, "y": 16, "w": 8, "h": 6 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "nodejs_heap_size_used_bytes{job=~\"$job\"} / 1024 / 1024",
              "legendFormat": "Heap {{ "{{" }}job{{ "}}" }} (MB)"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "decmbytes" }
          }
        },
        {
          "id": 6,
          "title": "💾 SATURATION — Event Loop Lag",
          "type": "timeseries",
          "gridPos": { "x": 16, "y": 16, "w": 8, "h": 6 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "nodejs_eventloop_lag_seconds{job=~\"$job\"} * 1000",
              "legendFormat": "Event Loop Lag {{ "{{" }}job{{ "}}" }} (ms)"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "ms" }
          }
        },
        {
          "id": 7,
          "title": "🟢 Service Health — Up/Down",
          "type": "stat",
          "gridPos": { "x": 0, "y": 22, "w": 24, "h": 4 },
          "datasource": "Prometheus",
          "targets": [
            { "expr": "up{job=\"recipe-service\"}",         "legendFormat": "Recipe Service" },
            { "expr": "up{job=\"user-service\"}",           "legendFormat": "User Service" },
            { "expr": "up{job=\"recommendation-service\"}", "legendFormat": "Recommendation Service" }
          ],
          "options": {
            "graphMode": "none",
            "colorMode": "background",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" } } },
                { "type": "value", "options": { "1": { "text": "UP",   "color": "green" } } }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": 0, "color": "red" },
                  { "value": 1, "color": "green" }
                ]
              }
            }
          }
        }
      ]
    }
