# ================================================================
#  ChefMatch — Grafana Dashboards
#  FIX: datasource referenciado por uid en cada panel para evitar
#  el "No data" cuando el nombre no coincide exactamente.
# ================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provisioning
  namespace: chefmatch
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'ChefMatch'
        orgId: 1
        folder: 'ChefMatch'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /tmp/dashboards

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: chefmatch
  labels:
    grafana_dashboard: "1"
data:
  four-golden-signals.json: |
    {
      "id": null,
      "uid": "chefmatch-golden",
      "title": "ChefMatch - Four Golden Signals",
      "tags": ["chefmatch"],
      "timezone": "browser",
      "refresh": "30s",
      "schemaVersion": 36,
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "job",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": { "query": "label_values(http_requests_total, job)", "refId": "A" },
            "label": "Service",
            "refresh": 2,
            "includeAll": true,
            "allValue": ".*",
            "current": {}
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "LATENCY - Response Time P50/P95/P99",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{job=~\"$job\"}[5m])) by (le, job, route))",
              "legendFormat": "P50 {{job}} {{route}}"
            },
            {
              "refId": "B",
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=~\"$job\"}[5m])) by (le, job, route))",
              "legendFormat": "P95 {{job}} {{route}}"
            },
            {
              "refId": "C",
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=~\"$job\"}[5m])) by (le, job, route))",
              "legendFormat": "P99 {{job}} {{route}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "s", "custom": { "lineWidth": 2 } }
          }
        },
        {
          "id": 2,
          "title": "TRAFFIC - Requests per Second",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(http_requests_total{job=~\"$job\"}[5m])) by (job, route)",
              "legendFormat": "{{job}} {{route}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 3,
          "title": "ERRORS - Error Rate",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(http_request_errors_total{job=~\"$job\",error_type=\"server_error\"}[5m])) by (job, route)",
              "legendFormat": "5xx {{job}} {{route}}"
            },
            {
              "refId": "B",
              "expr": "sum(rate(http_request_errors_total{job=~\"$job\",error_type=\"client_error\"}[5m])) by (job, route)",
              "legendFormat": "4xx {{job}} {{route}}"
            },
            {
              "refId": "C",
              "expr": "100 * sum(rate(http_request_errors_total{job=~\"$job\"}[5m])) / sum(rate(http_requests_total{job=~\"$job\"}[5m]))",
              "legendFormat": "Error Rate %"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": 0, "color": "green" },
                  { "value": 5, "color": "yellow" },
                  { "value": 10, "color": "red" }
                ]
              }
            }
          }
        },
        {
          "id": 4,
          "title": "SATURATION - CPU Usage",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 16, "w": 8, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "rate(process_cpu_user_seconds_total{job=~\"$job\"}[5m]) * 100",
              "legendFormat": "CPU {{job}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "percent" } }
        },
        {
          "id": 5,
          "title": "SATURATION - Heap Memory Used",
          "type": "timeseries",
          "gridPos": { "x": 8, "y": 16, "w": 8, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "nodejs_heap_size_used_bytes{job=~\"$job\"} / 1024 / 1024",
              "legendFormat": "Heap {{job}} MB"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "decmbytes" } }
        },
        {
          "id": 6,
          "title": "SATURATION - Event Loop Lag",
          "type": "timeseries",
          "gridPos": { "x": 16, "y": 16, "w": 8, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "nodejs_eventloop_lag_seconds{job=~\"$job\"} * 1000",
              "legendFormat": "EventLoop {{job}} ms"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "ms" } }
        },
        {
          "id": 7,
          "title": "Service Health - Up/Down",
          "type": "stat",
          "gridPos": { "x": 0, "y": 22, "w": 24, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "refId": "A", "expr": "up{job=\"recipe-service\"}",         "legendFormat": "Recipe Service" },
            { "refId": "B", "expr": "up{job=\"user-service\"}",           "legendFormat": "User Service" },
            { "refId": "C", "expr": "up{job=\"recommendation-service\"}", "legendFormat": "Recommendation Service" }
          ],
          "options": {
            "graphMode": "none",
            "colorMode": "background",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" } } },
                { "type": "value", "options": { "1": { "text": "UP", "color": "green" } } }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": 0, "color": "red" },
                  { "value": 1, "color": "green" }
                ]
              }
            }
          }
        }
      ]
    }
