{{- range $key, $service := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $service.name }}
  namespace: chefmatch
  labels:
    app: {{ $service.name }}
spec:
  replicas: {{ $service.replicas | default 1 }}
  selector:
    matchLabels:
      app: {{ $service.name }}
  template:
    metadata:
      labels:
        app: {{ $service.name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ $service.targetPort | default 8000 | quote }}
    spec:
      # Wait for MongoDB to accept connections before starting any service
      initContainers:
      - name: wait-for-mongo
        image: busybox:1.36
        command:
          - sh
          - -c
          - |
            echo "Waiting for MongoDB at mongo-service:27017..."
            until nc -z mongo-service 27017; do
              echo "MongoDB not ready yet, retrying in 3s..."
              sleep 3
            done
            echo "MongoDB is ready!"
      containers:
      - name: {{ $service.name }}
        image: {{ $service.image }}
        ports:
        - containerPort: {{ $service.targetPort | default 8000 }}
        env:
        - name: PORT
          value: {{ $service.targetPort | default 8000 | quote }}
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: rabbitmq-url
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: mongo-uri
        - name: KEYCLOAK_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: keycloak-url
        - name: KEYCLOAK_REALM
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: keycloak-realm
        - name: KEYCLOAK_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: keycloak-client-id
        - name: KEYCLOAK_RECOMMENDATION_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: keycloak-recommendation-client-id
        - name: KEYCLOAK_RECOMMENDATION_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: keycloak-recommendation-client-secret
        # Service-specific env goes LAST so it overrides shared secrets above
        {{- if $service.env }}
        {{- range $env := $service.env }}
        - name: {{ $env.name }}
          value: {{ $env.value | quote }}
        {{- end }}
        {{- end }}

        # Readiness: only route traffic once /health returns 200
        readinessProbe:
          httpGet:
            path: /health
            port: {{ $service.targetPort | default 8000 }}
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 6

        # Liveness: restart the container if it stops responding
        livenessProbe:
          httpGet:
            path: /health
            port: {{ $service.targetPort | default 8000 }}
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 3
---
{{- end }}
