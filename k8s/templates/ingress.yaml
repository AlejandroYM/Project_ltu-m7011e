apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chef-api-ingress
  namespace: chefmatch
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.priority: "100"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"   
spec:
  ingressClassName: traefik
  tls:                                                    
    - hosts:
        - ltu-m7011e-5.se
      secretName: chefmatch-tls                          
  rules:
  - host: ltu-m7011e-5.se
    http:
      paths:
      - path: /recipes
        pathType: Prefix
        backend:
          service:
            name: recipe-service
            port:
              number: 8000
      - path: /users
        pathType: Prefix
        backend:
          service:
            name: user-service
            port:
              number: 8000
      - path: /recommendations
        pathType: Prefix
        backend:
          service:
            name: recommendation-service
            port:
              number: 8000
      - path: /meal-plans
        pathType: Prefix
        backend:
          service:
            name: recipe-service
            port:
              number: 8000

---

apiVersion: networking.k8s.io/v1
