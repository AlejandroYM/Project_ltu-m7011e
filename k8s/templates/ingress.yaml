# Ingress 1: API routes (prioridad alta)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chef-api-ingress
  namespace: chefmatch
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.priority: "100"
spec:
  ingressClassName: traefik
  rules:
  - host: ltu-m7011e-5.se
    http:
      paths:
      - path: /recipes
        pathType: Prefix
        backend:
          service:
            name: recipe-service
            port:
              number: 8000
      - path: /users
        pathType: Prefix
        backend:
          service:
            name: user-service
            port:
              number: 8000
      - path: /recommendations
        pathType: Prefix
        backend:
          service:
            name: recommendation-service
            port:
              number: 8000
      - path: /meal-plans
        pathType: Prefix
        backend:
          service:
            name: recipe-service
            port:
              number: 8000

---
# Ingress 2: Frontend catch-all (prioridad baja)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chef-frontend-ingress
  namespace: chefmatch
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.priority: "1"
spec:
  ingressClassName: traefik
  rules:
  - host: ltu-m7011e-5.se
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: chef-frontend
            port:
              number: 80

---
# Middleware: elimina el prefijo /rabbitmq antes de enviar la petición al pod.
# Sin esto, RabbitMQ recibe /rabbitmq/api/... y no encuentra el recurso
# porque internamente ya sabe que está montado en /rabbitmq (path_prefix).
# El nombre del middleware en la anotación sigue el patrón:
#   <namespace>-<metadata.name>@kubernetescrd
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rabbitmq-stripprefix
  namespace: chefmatch
spec:
  stripPrefix:
    prefixes:
      - /rabbitmq

---
# Ingress 3: RabbitMQ Management UI en /rabbitmq
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rabbitmq-ingress
  namespace: chefmatch
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.priority: "50"
    # Aplica el middleware StripPrefix para quitar /rabbitmq antes de llegar al pod
    traefik.ingress.kubernetes.io/router.middlewares: chefmatch-rabbitmq-stripprefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
  - host: ltu-m7011e-5.se
    http:
      paths:
      - path: /rabbitmq
        pathType: Prefix
        backend:
          service:
            name: rabbitmq-service
            port:
              number: 15672
