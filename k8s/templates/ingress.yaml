# Ingress 1: API routes (prioridad alta)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chef-api-ingress
  namespace: chefmatch
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.priority: "100"
spec:
  ingressClassName: traefik
  rules:
  - host: ltu-m7011e-5.se
    http:
      paths:
      - path: /recipes
        pathType: Prefix
        backend:
          service:
            name: recipe-service
            port:
              number: 8000
      - path: /users
        pathType: Prefix
        backend:
          service:
            name: user-service
            port:
              number: 8000
      - path: /recommendations
        pathType: Prefix
        backend:
          service:
            name: recommendation-service
            port:
              number: 8000
      - path: /meal-plans
        pathType: Prefix
        backend:
          service:
            name: recipe-service
            port:
              number: 8000

---
# Ingress 2: Frontend catch-all (prioridad baja)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chef-frontend-ingress
  namespace: chefmatch
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.priority: "1"
spec:
  ingressClassName: traefik
  rules:
  - host: ltu-m7011e-5.se
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: chef-frontend
            port:
              number: 80

---
# Ingress 3: RabbitMQ Management UI
# RabbitMQ ya sabe que está en /rabbitmq (management.path_prefix en rabbitmq.conf)
# así que genera todos sus assets como /rabbitmq/js/... — NO necesitamos StripPrefix.
# StripPrefix + path_prefix simultáneos rompen los assets JS.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rabbitmq-ingress
  namespace: chefmatch
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.priority: "50"
spec:
  ingressClassName: traefik
  rules:
  - host: ltu-m7011e-5.se
    http:
      paths:
      - path: /rabbitmq
        pathType: Prefix
        backend:
          service:
            name: rabbitmq-service
            port:
              number: 15672

---
# Ingress 4: Grafana en /grafana
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: chefmatch
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.priority: "50"
spec:
  ingressClassName: traefik
  rules:
    - host: ltu-m7011e-5.se
      http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana-service
                port:
                  number: 3000
