# Ingress 1: API routes (prioridad alta)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chef-api-ingress
  namespace: chefmatch
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.priority: "100"
spec:
  ingressClassName: traefik
  rules:
  - host: ltu-m7011e-5.se
    http:
      paths:
      - path: /recipes
        pathType: Prefix
        backend:
          service:
            name: recipe-service
            port:
              number: 8000
      - path: /users
        pathType: Prefix
        backend:
          service:
            name: user-service
            port:
              number: 8000
      - path: /recommendations
        pathType: Prefix
        backend:
          service:
            name: recommendation-service
            port:
              number: 8000
      - path: /meal-plans
        pathType: Prefix
        backend:
          service:
            name: recipe-service
            port:
              number: 8000

---
# Ingress 2: Frontend catch-all (prioridad baja)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chef-frontend-ingress
  namespace: chefmatch
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.priority: "1"
spec:
  ingressClassName: traefik
  rules:
  - host: ltu-m7011e-5.se
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: chef-frontend
            port:
              number: 80

---
# Ingress 3: RabbitMQ
# SIN StripPrefix — RabbitMQ tiene path_prefix=/rabbitmq en advanced.config
# y genera todos sus assets como /rabbitmq/js/... correctamente
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rabbitmq-ingress
  namespace: chefmatch
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.priority: "50"
spec:
  ingressClassName: traefik
  rules:
  - host: ltu-m7011e-5.se
    http:
      paths:
      - path: /rabbitmq
        pathType: Prefix
        backend:
          service:
            name: rabbitmq-service
            port:
              number: 15672

